spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/cinema_db?currentSchema=booking
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: booking
        format_sql: true
    show-sql: true

eureka:
  client:
    enabled: false

rabbitmq:
  host: localhost
  port: 5672