server:
  port: 8082

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_db?currentSchema=booking
    username: postgres
    password: 4748
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # Use 'validate' to ensure schema matches entities
    properties:
      hibernate:
        default_schema: booking
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: booking
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

core:
  service:
    url: http://localhost:8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/