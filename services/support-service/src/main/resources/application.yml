server:
  port: 8084

spring:
  application:
    name: support-service
  datasource:
    url: jdbc:postgresql://postgres:5433/cinema_db?currentSchema=support
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:


  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/cinema-realm/protocol/openid-connect/certs}

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: ${RABBITMQ_PASSWORD:guest}
    template:
      retry:
        enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: arsema.tesfaye@aastustudent.edu.et
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true
rabbitmq:
  queue:
    bookingConfirmed: booking.confirmed.queue

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

keycloak:
  admin:
    server-url: http://keycloak:8080
    realm: cinema-realm
    client-id: support-service
    client-secret: ${KEYCLOAK_CLIENT_SECRET}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:tickets}
logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.springframework.web.servlet.mvc.method.annotation: INFO
    com.cinema.supportservice: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
